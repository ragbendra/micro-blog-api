services:
  - type: web
    name: micro-blog-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: micro-blog-api-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEMO_USER_EMAIL
        sync: false
      - key: DEMO_USER_PASS
        sync: false

databases:
  - name: micro-blog-api-db
    plan: free
    databaseName: micro_blog_api
